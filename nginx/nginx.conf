events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream auth_service {
        server auth-service:5000;
    }

    upstream banking_service {
        server banking-service:5001;
    }

    upstream device_service {
        server device-service:5002;
    }

    upstream admin_ui {
        server admin-ui:80;
    }

    upstream banking_ui {
        server banking-ui:80;
    }

    server {
        listen 80;
        server_name localhost;

        # API Routes
        location /api/login {
            proxy_pass http://auth_service/api/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/admin/ {
            proxy_pass http://auth_service/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/banking/ {
            proxy_pass http://banking_service/api/banking/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/devices/ {
            proxy_pass http://device_service/api/devices/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # UI Routes
        location /admin/ {
            proxy_pass http://admin_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Handle React Router
            error_page 404 =200 /index.html;
        }

        location / {
            proxy_pass http://banking_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Handle React Router
            error_page 404 =200 /index.html;
        }
    }
}
