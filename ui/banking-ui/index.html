<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexus Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="login-container" class="hidden" style="width:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; gap:20px;">
    <h1 style="font-size:3rem; color:var(--primary); font-weight:800;">Nexus Bank</h1>
    <p style="color:var(--text-muted);">Please connect your account to continue.</p>
    <button id="login-btn" class="btn-primary" style="width: auto; padding: 1rem 3rem;">Login via SSO</button>
  </div>

  <div id="app-container" class="hidden" style="width: 100%; display: flex; height: 100vh;">
    <aside class="sidebar">
      <div class="brand">NEXUS BANK</div>
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="transactions">Transactions</button>
      <button class="nav-btn" data-view="transfer">Transfer Money</button>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1 id="page-title">Dashboard</h1>
        <div class="user-info">
          <span id="user-role-badge" style="background: rgba(59,130,246,0.2); color: var(--primary); padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase;">Role</span>
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
      </header>

      <!-- Dashboard View -->
      <section id="view-dashboard" class="view-section">
        <div class="card-grid">
          <div class="card">
            <h3>Total Balance</h3>
            <div class="value" id="dash-balance">$0.00</div>
          </div>
          <div class="card">
            <h3>Account Number</h3>
            <div class="value" id="dash-account" style="font-size: 1.5rem; margin-top: 10px; color: var(--text-main); -webkit-text-fill-color: var(--text-main);">----</div>
          </div>
        </div>
      </section>

      <!-- Transactions View -->
      <section id="view-transactions" class="view-section hidden">
        <div class="card">
          <table id="transactions-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Transfer View -->
      <section id="view-transfer" class="view-section hidden">
        <div class="card" style="max-width: 500px;">
          <form id="transfer-form">
            <div class="form-group">
              <label>Destination Account</label>
              <input type="text" id="transfer-dest" class="form-control" required placeholder="e.g. 9876543210">
            </div>
            <div class="form-group">
              <label>Amount ($)</label>
              <input type="number" id="transfer-amount" class="form-control" required min="1">
            </div>
            <button type="submit" class="btn-primary">Send Money</button>
          </form>
        </div>
      </section>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
