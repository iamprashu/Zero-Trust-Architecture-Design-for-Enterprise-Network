services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - zt_network

  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - banking-service
      - device-service
      - admin-ui
      - banking-ui
    networks:
      - zt_network

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/zero-trust-db
      - PORT=5000
      - DEVICE_SERVICE_URL=http://device-service:5002
      - CORS_ORIGINS=http://localhost
      - JWT_SECRET=adkh2teiuy
      - REFRESH_SECRET=admindi34234
      - SUPERADMIN_EMAIL=admin@gmail.com
      - SUPERADMIN_PASSWORD=admin@123
      - WEBAUTHN_RP_NAME=NexusBank
      - WEBAUTHN_RP_ID=localhost
      - WEBAUTHN_ORIGIN=http://localhost
      # OTP Device Fingerprint Salt — binds OTP sessions to the originating browser/machine.
      # Value is loaded from the root .env file via docker-compose variable substitution.
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - FINGERPRINT_SALT=${FINGERPRINT_SALT}
    depends_on:
      - mongodb
    deploy:
      replicas: 1
    networks:
      - zt_network

  banking-service:
    build:
      context: .
      dockerfile: services/banking/Dockerfile
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/zero-trust-db
      - PORT=5001
      - AUTH_VERIFY_URL=http://auth-service:5000/api/auth/verify
      - CORS_ORIGINS=http://localhost
    depends_on:
      - mongodb
    deploy:
      replicas: 1
    networks:
      - zt_network

  device-service:
    build:
      context: .
      dockerfile: services/device-service/Dockerfile
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/zero-trust-db
      - PORT=5002
      - CORS_ORIGINS=http://localhost
      - EMAIL_USER=iamprashu.ca@gmail.com
      - EMAIL_PASS=
      - EMAIL_FROM=Zero Trust Security <iamprashu.ca@gmail.com>
    depends_on:
      - mongodb
    deploy:
      replicas: 1
    networks:
      - zt_network

  admin-ui:
    build:
      context: .
      dockerfile: ui/admin-panel/Dockerfile
    deploy:
      replicas: 1
    networks:
      - zt_network

  banking-ui:
    build:
      context: .
      dockerfile: ui/banking-ui/Dockerfile
    deploy:
      replicas: 1
    networks:
      - zt_network

volumes:
  mongodb_data:

networks:
  zt_network:
    driver: bridge
